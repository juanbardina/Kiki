##########
# HOME PAGE SETTINGS
##########

# Pick one of your 'objectid' names from posters.csv to be the main image
featured-image: "poster_01"
# This can be the same ID; it creates the background behind the title
home-banner-image: "poster_01"

# Button on the home page
home-button-text: "Explore the Archive"
home-button-link: "/browse"

##########
# COLOR SETTINGS
##########

# This will give your site a "Punk/DIY" look (Black header, Red accents)
navbar-color: "#000000"
navbar-text-color: "#ffffff"
boot-theme-colors: 
  primary: "#cc0000"
  secondary: "#6c757d"
  success: "#28a745"
  info: "#17a2b8"
  warning: "#ffc107"
  danger: "#dc3545"
  light: "#f8f9fa"
  dark: "#343a40"

##########
# EXTRAS
##########

# Keep this as true to show the "Sample Items" on the home page
home-featured-objects: true
