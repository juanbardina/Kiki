##########
# collectionbuilder-csv
# Jekyll Digital Collection Generator
##########

##########
# URL VARIABLES
# Replace 'juanbardina' and 'your-repository-name' with your actual info
url: "https://juanbardina.github.io"
baseurl: "/your-repository-name"
source-code: "https://github.com/juanbardina/your-repository-name"

##########
# SITE SETTINGS
title: "Reagan-Bush Era Punk Poster Archive"
tagline: "Visual Politics and DIY Aesthetics (1980-1992)"
description: "A digital collection of political punk posters and flyers from the Reagan and Bush administrations."
keywords: "punk; reagan; bush; political posters; archives; DIY"
author: "Juan Bardina"

##########
# COLLECTION SETTINGS
# Ensure your CSV in the _data folder is named exactly 'posters.csv'
metadata: "posters"

##########
# ORGANIZATION SETTINGS
organization-name: "Stanford Digital Humanities Archive"
organization-link: "https://history.stanford.edu/"
# Leave these empty to remove the default Idaho logos
organization-logo-banner: ""
organization-logo-nav: ""

##########
# ROBOTS EXCLUDE
# noindex: true 

##########
# BUILD SETTINGS 
lib-assets: "/assets/lib"
# These files are ignored during the build process
exclude: [docs/, Rakefile, rakelib/, README.md, LICENSE, CITATION.cff, CODE_OF_CONDUCT.md, CONTRIBUTING.md, SECURITY.md]
sass:
  style: compressed
